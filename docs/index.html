<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    /* Desktop default: full height, width scales to keep aspect ratio */
    .hero-image {
      height: 100vh;
      width: auto;
      display: block;
      margin: 0 auto;
    }

    /* Mobile: full width, height scales to keep aspect ratio */
    @media (max-width: 768px) {
      .hero-image {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <img src="homepage.jpeg" class="hero-image">
</body>
</html>
